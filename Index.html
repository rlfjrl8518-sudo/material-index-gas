<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>소재 인덱싱 시스템</title>

<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {

    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;

    background: #f0f2f5; color: #1a1a2e; min-height: 100vh;

  }



  .header {

    background: #1a1a2e; color: #fff; padding: 0 32px; height: 56px;

    display: flex; align-items: center; justify-content: space-between;

    position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.25);

  }

  .header h1 { font-size: 16px; font-weight: 600; }



  .tab-nav {

    background: #fff; border-bottom: 1px solid #e5e7eb;

    display: flex; padding: 0 32px;

  }

  .tab-btn {

    padding: 14px 20px; font-size: 13px; font-weight: 500; color: #6b7280;

    cursor: pointer; border: none; background: none;

    border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s;

  }

  .tab-btn.active { color: #4f6ef7; border-bottom-color: #4f6ef7; }

  .tab-btn:hover:not(.active) { color: #374151; }



  .btn {

    display: inline-flex; align-items: center; gap: 6px;

    padding: 8px 16px; border-radius: 6px; font-size: 13px;

    font-weight: 500; cursor: pointer; border: none; transition: all .15s;

  }

  .btn:disabled { opacity: .5; cursor: not-allowed; }

  .btn-primary  { background: #4f6ef7; color: #fff; }

  .btn-primary:hover:not(:disabled)  { background: #3b5beb; }

  .btn-secondary { background: #fff; color: #374151; border: 1px solid #d1d5db; }

  .btn-secondary:hover:not(:disabled) { background: #f9fafb; }

  .btn-detect   { background: #0ea5e9; color: #fff; }

  .btn-detect:hover:not(:disabled)   { background: #0284c7; }

  .btn-danger   { background: #ef4444; color: #fff; }

  .btn-danger:hover:not(:disabled)   { background: #dc2626; }

  .btn-ghost    { background: transparent; color: #6b7280; border: 1px solid #e5e7eb; }

  .btn-ghost:hover:not(:disabled)    { background: #f9fafb; }

  .btn-sm  { padding: 5px 10px; font-size: 12px; }

  .btn-lg  { padding: 11px 24px; font-size: 14px; width: 100%; justify-content: center; }



  .tab-panel { display: none; }

  .tab-panel.active { display: block; }



  .container {

    max-width: 1100px; margin: 0 auto; padding: 28px 24px;

    display: grid; grid-template-columns: 320px 1fr; gap: 24px; align-items: start;

  }

  .container-single { max-width: 960px; margin: 0 auto; padding: 28px 24px; }



  .card { background: #fff; border-radius: 10px; border: 1px solid #e5e7eb; overflow: hidden; margin-bottom: 16px; }

  .card:last-child { margin-bottom: 0; }

  .card-header {

    padding: 14px 20px; border-bottom: 1px solid #f3f4f6;

    font-size: 13px; font-weight: 600; color: #374151;

    display: flex; align-items: center; justify-content: space-between; gap: 8px;

  }

  .card-body { padding: 20px; }



  .upload-zone {

    border: 2px dashed #d1d5db; border-radius: 8px; padding: 28px 16px;

    text-align: center; cursor: pointer; transition: all .2s; background: #fafafa; position: relative;

  }

  .upload-zone.dragover { border-color: #4f6ef7; background: #eff2ff; }

  .upload-zone:hover { border-color: #9ca3af; }

  .upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

  .upload-icon { font-size: 28px; margin-bottom: 6px; }

  .upload-hint { font-size: 11px; color: #6b7280; margin-top: 3px; }



  .preview-area { margin-top: 10px; display: none; }

  .preview-area.show { display: block; }

  .preview-area img, .preview-area video {

    width: 100%; border-radius: 6px; border: 1px solid #e5e7eb;

    max-height: 200px; object-fit: contain; background: #f9fafb;

  }

  .preview-name { margin-top: 5px; font-size: 11px; color: #6b7280; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }



  .auto-field {

    background: #f8faff; border: 1px solid #dbeafe; border-radius: 6px;

    padding: 9px 11px; font-size: 12px; margin-bottom: 8px;

  }

  .auto-field label { font-size: 11px; color: #6b7280; display: block; margin-bottom: 2px; }

  .auto-field .value { font-weight: 600; color: #1d4ed8; word-break: break-all; }

  .auto-field .value.empty { color: #9ca3af; font-weight: 400; font-style: italic; }



  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .form-group { display: flex; flex-direction: column; gap: 4px; }

  .form-group.full { grid-column: 1 / -1; }

  .form-group label { font-size: 12px; font-weight: 500; color: #374151; }

  .form-group label .req { color: #ef4444; margin-left: 2px; }

  .form-control {

    padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px;

    font-size: 13px; color: #1a1a2e; background: #fff; transition: border-color .15s; width: 100%;

  }

  .form-control:focus { outline: none; border-color: #4f6ef7; box-shadow: 0 0 0 3px rgba(79,110,247,.1); }

  .form-control:disabled { background: #f9fafb; color: #9ca3af; cursor: not-allowed; }

  .form-control.error { border-color: #ef4444; }



  /* 계층 드롭다운 섹션 구분선 */

  .cascade-section {

    background: #f8f9ff; border: 1px solid #e0e7ff; border-radius: 8px;

    padding: 14px; margin-bottom: 12px;

  }

  .cascade-section-label {

    font-size: 11px; font-weight: 600; color: #6366f1; margin-bottom: 10px;

    text-transform: uppercase; letter-spacing: .5px;

  }



  .msg {

    border-radius: 7px; padding: 10px 13px; font-size: 13px;

    display: none; margin-bottom: 12px; align-items: flex-start; gap: 8px;

  }

  .msg.show { display: flex; }

  .msg-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }

  .msg-error   { background: #fff1f2; border: 1px solid #fecdd3; color: #991b1b; }

  .msg-info    { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; }



  .detect-panel { display: none; margin-top: 16px; }

  .detect-panel.show { display: block; }

  .detect-list { max-height: 260px; overflow-y: auto; border: 1px solid #e5e7eb; border-radius: 6px; margin-top: 10px; }

  .detect-item {

    padding: 9px 13px; border-bottom: 1px solid #f3f4f6;

    font-size: 12px; display: flex; align-items: center; justify-content: space-between; gap: 8px;

  }

  .detect-item:last-child { border-bottom: none; }

  .detect-item.done { opacity: .4; }

  .detect-item-info .media { font-weight: 600; color: #4f6ef7; }

  .detect-item-info .name  { color: #374151; margin-top: 2px; }

  .detect-badge {

    display: inline-block; padding: 2px 8px; border-radius: 12px;

    font-size: 10px; font-weight: 600; background: #dbeafe; color: #1e40af; white-space: nowrap;

  }

  .detect-badge.done { background: #d1fae5; color: #065f46; }



  /* -- 설정 탭 -- */

  .settings-intro {

    background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px;

    padding: 11px 15px; font-size: 13px; color: #92400e; margin-bottom: 16px;

  }



  /* 계층 아코디언 */

  .media-section {
    border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; margin-bottom: 8px;
  }

  .media-section-header {
    display: flex; align-items: center; gap: 8px;
    background: #f9fafb; padding: 10px 14px; cursor: pointer;
    user-select: none; transition: background .15s;
  }

  .media-section-header:hover { background: #f0f2f5; }

  .media-toggle {
    font-size: 11px; color: #6b7280; transition: transform .2s; flex-shrink: 0;
  }

  .media-section.open .media-toggle { transform: rotate(90deg); }

  .media-name-input {
    flex: 1; font-size: 13px; font-weight: 600; color: #1a1a2e;
    border: none; background: transparent; outline: none; cursor: text; min-width: 80px;
  }

  .media-name-input:focus {
    background: #fff; border-radius: 4px; padding: 1px 6px; outline: 1px solid #4f6ef7;
  }

  .media-row-count {
    font-size: 11px; color: #9ca3af; background: #e5e7eb;
    padding: 2px 7px; border-radius: 10px; flex-shrink: 0;
  }

  .media-section-body {
    display: none; border-top: 1px solid #e5e7eb;
  }

  .media-section.open .media-section-body { display: block; }

  .media-section-body-inner { padding: 10px 14px; }

  .h-table-wrap { overflow-x: auto; }

  .h-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 400px; }

  .h-table th {
    background: #f3f4f6; padding: 7px 10px; text-align: left;
    font-weight: 600; color: #374151; border-bottom: 2px solid #e5e7eb; white-space: nowrap;
  }

  .h-table td { padding: 4px 5px; border-bottom: 1px solid #f3f4f6; }

  .h-table tr:last-child td { border-bottom: none; }

  .h-input {
    width: 100%; padding: 5px 8px; border: 1px solid #e5e7eb;
    border-radius: 5px; font-size: 12px; min-width: 80px;
  }

  .h-input:focus { outline: none; border-color: #4f6ef7; }

  .media-add-row {
    display: flex; gap: 8px; margin-top: 8px; padding-top: 10px; border-top: 1px dashed #e5e7eb;
  }

  .new-media-bar {
    display: flex; gap: 8px; align-items: center; margin-top: 12px; padding-top: 12px;
    border-top: 2px dashed #e5e7eb;
  }

  /* 캠페인 아코디언 (2단계) */
  .campaign-container { display: flex; flex-direction: column; gap: 5px; }
  .campaign-section { border: 1px solid #dde3f0; border-radius: 6px; overflow: hidden; }
  .campaign-section-header {
    display: flex; align-items: center; gap: 7px;
    background: #eef0fb; padding: 7px 11px; cursor: pointer; user-select: none;
  }
  .campaign-section-header:hover { background: #e4e8f8; }
  .campaign-toggle { font-size: 10px; color: #7c87a6; transition: transform .2s; flex-shrink: 0; }
  .campaign-section.open .campaign-toggle { transform: rotate(90deg); }
  .campaign-name-input {
    flex: 1; font-size: 12px; font-weight: 600; color: #374151;
    border: none; background: transparent; outline: none; min-width: 80px;
  }
  .campaign-name-input:focus { background: #fff; border-radius: 4px; padding: 1px 5px; outline: 1px solid #4f6ef7; }
  .campaign-section-body { display: none; border-top: 1px solid #dde3f0; }
  .campaign-section.open .campaign-section-body { display: block; }
  .campaign-section-body-inner { padding: 8px 10px; }
  .add-camp-bar { display: flex; gap: 7px; margin-top: 8px; padding-top: 8px; border-top: 1px dashed #dde3f0; }

  /* 그룹 아코디언 (3단계) */
  .group-container { display: flex; flex-direction: column; gap: 4px; }
  .group-section { border: 1px solid #e8ecf3; border-radius: 5px; overflow: hidden; }
  .group-section-header {
    display: flex; align-items: center; gap: 6px;
    background: #f5f7ff; padding: 6px 10px; cursor: pointer; user-select: none;
  }
  .group-section-header:hover { background: #ecf0ff; }
  .group-toggle { font-size: 9px; color: #9ca3af; transition: transform .2s; flex-shrink: 0; }
  .group-section.open .group-toggle { transform: rotate(90deg); }
  .group-name-input {
    flex: 1; font-size: 12px; font-weight: 500; color: #4b5563;
    border: none; background: transparent; outline: none; min-width: 80px;
  }
  .group-name-input:focus { background: #fff; border-radius: 4px; padding: 1px 5px; outline: 1px solid #4f6ef7; }
  .group-section-body { display: none; border-top: 1px solid #e8ecf3; }
  .group-section.open .group-section-body { display: block; }
  .group-section-body-inner { padding: 6px 10px; }
  .add-group-bar { display: flex; gap: 7px; margin-top: 6px; padding-top: 6px; border-top: 1px dashed #e8ecf3; }

  /* 소재이름 행 (그룹 내 최하위) */
  .creative-list { display: flex; flex-direction: column; gap: 2px; }
  .creative-row { display: flex; align-items: center; gap: 6px; padding: 3px 0; border-bottom: 1px solid #f3f4f6; }
  .creative-row:last-child { border-bottom: none; }
  .creative-row .h-input { flex: 1; }



  /* 설정 탭 서브탭 */
  .settings-sub-nav {
    display: flex; gap: 2px; margin-bottom: 20px;
    background: #f3f4f6; border-radius: 8px; padding: 3px;
  }
  .settings-sub-btn {
    flex: 1; padding: 7px 10px; font-size: 13px; font-weight: 500;
    color: #6b7280; border: none; background: none; border-radius: 6px;
    cursor: pointer; transition: all .15s; white-space: nowrap;
  }
  .settings-sub-btn.active { background: #fff; color: #1a1a2e; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
  .settings-sub-btn:hover:not(.active) { color: #374151; }
  .settings-sub-panel { display: none; }
  .settings-sub-panel.active { display: block; }

  /* 기타 드롭다운 그리드 */
  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .category-block { border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; }

  .category-header {

    background: #f9fafb; padding: 10px 13px;

    display: flex; align-items: center; gap: 8px;

  }

  .category-name-input {

    flex: 1; border: none; background: transparent;

    font-size: 13px; font-weight: 600; color: #374151; outline: none;

  }

  .category-name-input:focus { color: #4f6ef7; }

  .category-body { padding: 11px 13px; }



  .chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; min-height: 24px; }

  .chip {

    display: inline-flex; align-items: center; gap: 3px;

    background: #eff2ff; color: #3730a3; border: 1px solid #c7d2fe;

    border-radius: 20px; padding: 2px 9px; font-size: 12px;

  }

  .chip-remove {

    cursor: pointer; color: #6366f1; font-size: 14px; line-height: 1;

    background: none; border: none; padding: 0;

  }

  .chip-remove:hover { color: #ef4444; }

  .chip-empty { font-size: 12px; color: #9ca3af; font-style: italic; }



  .add-value-row { display: flex; gap: 5px; }

  .add-value-input {

    flex: 1; padding: 5px 8px; border: 1px solid #d1d5db;

    border-radius: 6px; font-size: 12px;

  }

  .add-value-input:focus { outline: none; border-color: #4f6ef7; }



  .add-category-row {

    display: flex; gap: 8px; padding: 12px 14px;

    border: 2px dashed #d1d5db; border-radius: 8px;

    align-items: center; margin-bottom: 14px;

  }

  .add-category-input {

    flex: 1; padding: 7px 11px; border: 1px solid #d1d5db;

    border-radius: 6px; font-size: 13px;

  }

  .add-category-input:focus { outline: none; border-color: #4f6ef7; }



  .spinner {

    width: 15px; height: 15px; border: 2px solid rgba(255,255,255,.4);

    border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; display: none;

  }

  .spinner.show { display: inline-block; }

  @keyframes spin { to { transform: rotate(360deg); } }



  /* 이미지 선택 모달 */

  .modal-overlay {

    position: fixed; inset: 0; background: rgba(0,0,0,.55);

    display: none; align-items: center; justify-content: center;

    z-index: 1000; padding: 20px;

  }

  .modal-overlay.open { display: flex; }

  .modal {

    background: #fff; border-radius: 14px; width: 100%; max-width: 900px;

    max-height: 88vh; display: flex; flex-direction: column;

    box-shadow: 0 24px 64px rgba(0,0,0,.35);

  }

  .modal-header {

    padding: 16px 20px; border-bottom: 1px solid #e5e7eb; flex-shrink: 0;

    display: flex; align-items: center; justify-content: space-between; gap: 12px;

  }

  .modal-title { font-size: 15px; font-weight: 600; color: #1a1a2e; }

  .modal-search {

    padding: 7px 12px; border: 1px solid #d1d5db; border-radius: 6px;

    font-size: 13px; width: 220px;

  }

  .modal-search:focus { outline: none; border-color: #4f6ef7; box-shadow: 0 0 0 3px rgba(79,110,247,.1); }

  .modal-body { padding: 16px; overflow-y: auto; flex: 1; min-height: 0; }

  .modal-empty {

    text-align: center; padding: 60px 20px; color: #9ca3af; font-size: 13px;

    grid-column: 1 / -1;

  }



  /* 이미지 피커 그리드 (모달) */

  .img-picker-grid {

    display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px;

  }

  .img-pick-item {

    border: 2px solid #e5e7eb; border-radius: 10px; overflow: hidden;

    cursor: pointer; transition: border-color .15s, box-shadow .15s; background: #fff;

  }

  .img-pick-item:hover { border-color: #4f6ef7; }

  .img-pick-item.selected {

    border-color: #4f6ef7;

    box-shadow: 0 0 0 3px rgba(79,110,247,.25);

  }

  .img-pick-thumb {

    width: 100%; aspect-ratio: 1; object-fit: cover;

    background: #f3f4f6; display: block;

  }

  .img-pick-placeholder {

    width: 100%; aspect-ratio: 1; display: flex; align-items: center;

    justify-content: center; font-size: 36px; background: #f3f4f6;

  }

  .img-pick-info { padding: 6px 8px 8px; }

  .img-pick-code {

    font-size: 11px; font-weight: 700; color: #4f6ef7;

    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;

  }

  .img-pick-name {

    font-size: 11px; color: #374151; margin-top: 2px;

    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;

  }

  .img-pick-date { font-size: 10px; color: #9ca3af; margin-top: 2px; }



  /* 선택 결과 바 */

  .img-selected-bar {

    display: none; margin-top: 8px; padding: 8px 10px;

    background: #eff2ff; border: 1px solid #c7d2fe; border-radius: 6px;

    font-size: 12px; color: #3730a3; align-items: center; gap: 8px;

  }

  .img-selected-bar.show { display: flex; }

  .img-selected-thumb {

    width: 36px; height: 36px; object-fit: cover; border-radius: 5px;

    background: #e0e7ff; flex-shrink: 0;

  }



  .divider { border: none; border-top: 1px solid #f3f4f6; margin: 16px 0; }

  .count-badge {

    background: #ef4444; color: #fff; border-radius: 10px;

    padding: 1px 7px; font-size: 11px; font-weight: 700;

  }

  .section-title {

    font-size: 13px; font-weight: 700; color: #1a1a2e; margin-bottom: 12px;

    display: flex; align-items: center; gap: 6px;

  }



  @media (max-width: 768px) {

    .container { grid-template-columns: 1fr; padding: 14px; }

    .form-grid  { grid-template-columns: 1fr; }

    .settings-grid { grid-template-columns: 1fr; }

    .tab-nav { padding: 0 14px; }

    .container-single { padding: 16px; }

  }


</style>

</head>

<body>



<div class="header">

  <h1>📋 소재 인덱싱 시스템</h1>

  <button class="btn btn-detect" id="btnDetect" onclick="runDetect()">

    <span>🔍 신규 소재 감지</span>

    <div class="spinner" id="spinDetect"></div>

  </button>

</div>



<div class="tab-nav">

  <button class="tab-btn active" onclick="switchTab('register', this)">📝 소재 등록</button>

  <button class="tab-btn" onclick="switchTab('settings', this)">⚙️ 설정 관리</button>

</div>



<!-- ════ TAB 1: 소재 등록 ════ -->

<div class="tab-panel active" id="panel-register">

  <div class="container">



    <!-- 왼쪽 -->

    <div>

      <div class="card">

        <div class="card-header">🖼 소재 파일</div>

        <div class="card-body">

          <div class="upload-zone" id="uploadZone"

               ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">

            <input type="file" id="fileInput"

                   accept="image/jpeg,image/png,image/gif,image/webp,video/mp4,video/quicktime"

                   onchange="onFileSelected(event)">

            <div class="upload-icon">📁</div>

            <div style="font-size:13px;color:#374151;font-weight:500;">드래그하거나 클릭해서 선택</div>

            <div class="upload-hint">jpg, png, gif, webp · mp4, mov</div>

          </div>

          <div class="preview-area" id="previewArea">

            <img id="previewImg" src="" alt="미리보기" style="display:none;">

            <video id="previewVideo" controls style="display:none;"></video>

            <div class="preview-name" id="previewName"></div>

          </div>

        </div>

      </div>



      <div class="card">

        <div class="card-header">

          <span>⚙️ 이미지코드</span>

          <label style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:400;cursor:pointer;">

            <input type="checkbox" id="useExistingCode" onchange="toggleCodeMode(this.checked)">

            기존 코드 선택

          </label>

        </div>

        <div class="card-body">

          <!-- 자동 생성 모드 -->

          <div id="autoCodeArea">

            <div class="auto-field">

              <label>이미지코드</label>

              <div class="value empty" id="displayCode">저장 시 자동 생성</div>

            </div>

          </div>

            소재_마스터의 디멘드젠·피맥스 소재를 기반으로 <strong>DG_PM_광고단위</strong> 시트를 재작성합니다.
            최초 1회 또는 데이터 불일치 시 실행하세요.
          </p>
          <div id="rebuildMsg" class="msg" style="margin-bottom:10px;"></div>
          <button class="btn btn-secondary" id="btnRebuildDGPM" onclick="runRebuildDGPM()">
            <div class="spinner" id="spinRebuild"></div>

<script>

// --- 전역 오류 포착 ------------------------------

window.onerror = function(msg, src, line) {

  var el = document.getElementById('_jsErr');

  if (!el) {

    el = document.createElement('div');

    el.id = '_jsErr';

    el.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#991b1b;color:#fff;padding:10px 16px;font-size:12px;z-index:9999;white-space:pre-wrap;';

    document.body.appendChild(el);

  }

  el.textContent = 'JS 오류: ' + msg + ' (line ' + line + ')';

};



// --- 전역 상태 -----------------------------------

let fileBase64        = null;

let fileName          = null;

let fileMime          = null;

let fileHash          = null;

let existingImageUrl  = '';

let settings       = {};

let settingsState  = [];

let hierarchy      = [];   // [{ 매체, 캠페인, 그룹, 소재이름 }]

let hierarchyState = [];   // 설정 탭 편집용

let detectItems    = [];

let detectIndex    = 0;

let isIndexing     = false;




// 기타 드롭다운 맵 (계층 4개 제외)

const DROPDOWN_MAP = {

  '광고유형':   'f_광고유형',

  '소재유형':   'f_소재유형',

  '소구포인트': 'f_소구포인트',

  '후킹방식':   'f_후킹방식',

  '이미지유형': 'f_이미지유형',

  '모델유형':   'f_모델유형',

  '보종':       'f_보종'

};

// 계층 키 (설정 탭 chip 렌더에서 제외)

const HIERARCHY_KEYS = new Set(['매체', '캠페인', '그룹', '소재이름']);



// --- 탭 전환 -------------------------------------

function switchTab(tab, btn) {

  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));

  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

  document.getElementById('panel-' + tab).classList.add('active');

  btn.classList.add('active');

  if (tab === 'settings') {

    loadHierarchyPanel(); // 기본 활성 서브탭: 매체 계층

  }

}

function switchSettingsTab(tabId, btn) {

  document.querySelectorAll('.settings-sub-panel').forEach(p => p.classList.remove('active'));

  document.querySelectorAll('.settings-sub-btn').forEach(b => b.classList.remove('active'));

  document.getElementById('sp-' + tabId).classList.add('active');

  btn.classList.add('active');

  if (tabId === 'hierarchy') loadHierarchyPanel();

  if (tabId === 'dropdown')  loadSettingsPanel();

}



// --- 초기화 --------------------------------------

document.addEventListener('DOMContentLoaded', () => {

  loadSettings();

  loadHierarchy();

});



function loadSettings() {

  google.script.run

    .withSuccessHandler(s => { settings = s; populateDropdowns(s); })

    .withFailureHandler(err => showError('설정 로드 실패: ' + err.message))

    .getSettings();

}



function populateDropdowns(s) {

  Object.entries(DROPDOWN_MAP).forEach(([key, id]) => {

    const sel = document.getElementById(id);

    if (!sel) return;

    const cur = sel.value;

    sel.innerHTML = '<option value="">선택</option>';

    (s[key] || []).forEach(v => {

      const o = document.createElement('option');

      o.value = v; o.textContent = v;

      sel.appendChild(o);

    });

    if (cur) sel.value = cur;

  });

}



// --- 계층 로드 -----------------------------------

function loadHierarchy() {

  google.script.run

    .withSuccessHandler(data => {

      hierarchy = data;

      // 매체 셀렉트 초기화

      const mediaVals = [...new Set(data.map(r => r.매체).filter(Boolean))];

      fillSelect('f_매체', mediaVals, '선택');

      document.getElementById('f_캠페인').disabled = true;

      document.getElementById('f_그룹').disabled = true;

      document.getElementById('f_소재이름').disabled = true;

    })

    .withFailureHandler(() => {})

    .getHierarchy();

}



// --- 연쇄 드롭다운 -------------------------------

function onMediaChange() {

  const 매체 = document.getElementById('f_매체').value;

  resetCascade(['f_캠페인','f_그룹','f_소재이름']);



  if (!매체) return;

  const vals = unique(hierarchy.filter(r => r.매체 === 매체).map(r => r.캠페인).filter(Boolean));

  fillSelect('f_캠페인', vals, '캠페인 선택');

  document.getElementById('f_캠페인').disabled = false;

}



function onCampaignChange() {

  const 매체   = document.getElementById('f_매체').value;

  const 캠페인 = document.getElementById('f_캠페인').value;

  resetCascade(['f_그룹','f_소재이름']);



  if (!캠페인) return;

  const vals = unique(

    hierarchy.filter(r => r.매체 === 매체 && r.캠페인 === 캠페인).map(r => r.그룹).filter(Boolean)

  );

  fillSelect('f_그룹', vals, '그룹 선택');

  document.getElementById('f_그룹').disabled = false;

}



function onGroupChange() {

  const 매체   = document.getElementById('f_매체').value;

  const 캠페인 = document.getElementById('f_캠페인').value;

  const 그룹   = document.getElementById('f_그룹').value;

  resetCascade(['f_소재이름']);



  if (!그룹) return;

  const vals = unique(

    hierarchy.filter(r => r.매체 === 매체 && r.캠페인 === 캠페인 && r.그룹 === 그룹)

             .map(r => r.소재이름).filter(Boolean)

  );

  fillSelect('f_소재이름', vals, '소재이름 선택');

  document.getElementById('f_소재이름').disabled = false;

}



function fillSelect(id, values, placeholder) {

  const sel = document.getElementById(id);

  sel.innerHTML = `<option value="">${placeholder}</option>`;

  values.forEach(v => {

    const o = document.createElement('option');

    o.value = v; o.textContent = v;

    sel.appendChild(o);

  });

}



function resetCascade(ids) {

  const placeholders = {

    'f_캠페인':   '매체 선택 후',

    'f_그룹':     '캠페인 선택 후',

    'f_소재이름': '그룹 선택 후'

  };

  ids.forEach(id => {

    const el = document.getElementById(id);

    el.innerHTML = `<option value="">${placeholders[id] || '선택'}</option>`;

    el.disabled = true;

    el.classList.remove('error');

  });

}



function unique(arr) { return [...new Set(arr)]; }



// --- 설정 탭 - 기타 드롭다운 ---------------------

function loadSettingsPanel() {

  hideSettingsMessages();

  google.script.run

    .withSuccessHandler(s => {

      settings = s;

      settingsState = Object.entries(s)

        .filter(([name]) => !HIERARCHY_KEYS.has(name))

        .map(([name, values]) => ({ name, values: [...values] }));

      renderCategories();

    })

    .withFailureHandler(err => showSettingsError('불러오기 실패: ' + err.message))

    .getSettings();

}



function renderCategories() {

  const list = document.getElementById('categoryList');

  list.innerHTML = '';

  settingsState.forEach((cat, ci) => list.appendChild(buildCategoryBlock(cat, ci)));

}



function buildCategoryBlock(cat, ci) {

  const block = document.createElement('div');

  block.className = 'category-block';

  block.id = 'cat-block-' + ci;



  const header = document.createElement('div');

  header.className = 'category-header';

  header.innerHTML = `

    <input class="category-name-input" type="text" value="${escHtml(cat.name)}"

           onchange="settingsState[${ci}].name = this.value.trim()" placeholder="카테고리명">

    <span style="font-size:11px;color:#9ca3af;" id="badge-count-${ci}">${cat.values.length}개</span>

    <button class="btn btn-danger btn-sm" onclick="removeCategory(${ci})">삭제</button>`;

  block.appendChild(header);



  const body = document.createElement('div');

  body.className = 'category-body';



  const chips = document.createElement('div');

  chips.className = 'chips'; chips.id = 'chips-' + ci;

  renderChips(chips, cat.values, ci);

  body.appendChild(chips);



  const addRow = document.createElement('div');

  addRow.className = 'add-value-row';

  addRow.innerHTML = `

    <input class="add-value-input" type="text" id="newVal-${ci}" placeholder="값 입력 후 Enter"

           onkeydown="if(event.key==='Enter'){event.preventDefault();addValue(${ci});}">

    <button class="btn btn-ghost btn-sm" onclick="addValue(${ci})">+ 추가</button>`;

  body.appendChild(addRow);

  block.appendChild(body);

  return block;

}



function renderChips(container, values, ci) {

  container.innerHTML = '';

  if (!values.length) {

    container.innerHTML = '<span class="chip-empty">값 없음</span>';

    return;

  }

  values.forEach((v, vi) => {

    const chip = document.createElement('span');

    chip.className = 'chip';

    chip.innerHTML = escHtml(v) + '<button class="chip-remove" onclick="removeValue(' + ci + ',' + vi + ')">&times;</button>';

    container.appendChild(chip);

  });

}



function addValue(ci) {

  const input = document.getElementById('newVal-' + ci);

  const val = input.value.trim();

  if (!val) return;

  settingsState[ci].values.push(val);

  input.value = '';

  renderChips(document.getElementById('chips-' + ci), settingsState[ci].values, ci);

  document.getElementById('badge-count-' + ci).textContent = settingsState[ci].values.length + '개';

}



function removeValue(ci, vi) {

  settingsState[ci].values.splice(vi, 1);

  renderChips(document.getElementById('chips-' + ci), settingsState[ci].values, ci);

  document.getElementById('badge-count-' + ci).textContent = settingsState[ci].values.length + '개';

}



function removeCategory(ci) {

  if (!confirm(`"${settingsState[ci].name}" 카테고리를 삭제하시겠습니까?`)) return;

  settingsState.splice(ci, 1);

  renderCategories();

}



function addCategory() {

  const input = document.getElementById('newCategoryName');

  const name = input.value.trim();

  if (!name) { alert('카테고리명을 입력하세요.'); return; }

  settingsState.push({ name, values: [] });

  input.value = '';

  renderCategories();

  document.querySelector('#categoryList .category-block:last-child')

    ?.scrollIntoView({ behavior: 'smooth', block: 'start' });

}



function saveAllSettings() {

  if (settingsState.some(c => !c.name.trim())) {

    showSettingsError('카테고리명이 비어 있는 항목이 있습니다.'); return;

  }

  setSavingSettings(true);

  google.script.run

    .withSuccessHandler(res => {

      setSavingSettings(false);

      if (res.error) { showSettingsError(res.message); return; }

      showSettingsSuccess('드롭다운 저장 완료!');

      loadSettings();

    })

    .withFailureHandler(err => { setSavingSettings(false); showSettingsError('저장 실패: ' + err.message); })

    .saveSettings(settingsState);

}



function runRebuildDGPM() {
  const btn = document.getElementById('btnRebuildDGPM');
  const spin = document.getElementById('spinRebuild');
  const txt = document.getElementById('btnRebuildText');
  const msg = document.getElementById('rebuildMsg');

  if (!confirm('소재_마스터의 디멘드젠·피맥스 소재 전체를 재구성합니다.\nDG_PM_광고단위 시트가 초기화됩니다. 계속하시겠습니까?')) return;

  btn.disabled = true; spin.classList.add('show'); txt.textContent = '재구성 중...'; msg.className = 'msg';

  google.script.run
    .withSuccessHandler(res => {
      btn.disabled = false; spin.classList.remove('show'); txt.textContent = '🔄 광고단위 재구성 실행';
      if (res.error) {
        msg.className = 'msg msg-error show'; msg.innerHTML = '❌ ' + res.message;
      } else {
        msg.className = 'msg msg-success show'; msg.innerHTML = '✅ ' + res.message;
      }
    })
    .withFailureHandler(e => {
      btn.disabled = false; spin.classList.remove('show'); txt.textContent = '🔄 광고단위 재구성 실행';
      msg.className = 'msg msg-error show'; msg.innerHTML = '❌ 실패: ' + e.message;
    })
    .rebuildDGPMUnits();
}

function setSavingSettings(saving) {

  document.getElementById('btnSaveSettings').disabled = saving;

  document.getElementById('spinSettings').classList.toggle('show', saving);

  document.getElementById('btnSaveSettingsText').textContent = saving ? '저장 중...' : '드롭다운 저장';

}



// --- 설정 탭 - 계층 관리 (3단계 아코디언: 매체 > 캠페인 > 그룹) ---

function loadHierarchyPanel() {
  google.script.run
    .withSuccessHandler(data => {
      hierarchyState = data.map(r => ({ ...r }));
      renderHierarchyAccordion();
    })
    .withFailureHandler(() => {})
    .getHierarchy();
}

function _getOpenState() {
  const container = document.getElementById('hierarchyAccordion');
  return {
    media:    new Set([...container.querySelectorAll('.media-section.open')]   .map(el => el.dataset.media)),
    camps:    new Set([...container.querySelectorAll('.campaign-section.open')].map(el => el.dataset.campKey)),
    groups:   new Set([...container.querySelectorAll('.group-section.open')]   .map(el => el.dataset.groupKey))
  };
}

function renderHierarchyAccordion(openState) {
  const container = document.getElementById('hierarchyAccordion');
  if (!openState) openState = _getOpenState();
  const firstLoad = openState.media.size === 0;

  container.innerHTML = '';

  // 3단계 그룹핑: 매체 → 캠페인 → 그룹 → [rows]
  const mediaOrder = [], groups = {};
  hierarchyState.forEach(row => {
    const m = row.매체   || '(미분류)';
    const c = row.캠페인 || '(미분류)';
    const g = row.그룹   || '(미분류)';
    if (!groups[m]) { groups[m] = { campOrder: [], camps: {} }; mediaOrder.push(m); }
    if (!groups[m].camps[c]) { groups[m].camps[c] = { grpOrder: [], grps: {} }; groups[m].campOrder.push(c); }
    if (!groups[m].camps[c].grps[g]) { groups[m].camps[c].grps[g] = []; groups[m].camps[c].grpOrder.push(g); }
    groups[m].camps[c].grps[g].push(row);
  });
  const uniqueMedia = [...new Set(mediaOrder)];

  if (!uniqueMedia.length) {
    container.innerHTML = '<p style="text-align:center;padding:20px 0;color:#9ca3af;font-size:12px;">매체가 없습니다. 아래 [+ 매체 추가] 버튼으로 추가하세요.</p>';
    return;
  }

  uniqueMedia.forEach(media => {
    const g = groups[media];
    const isOpen = openState.media.has(media);
    container.appendChild(buildMediaSection(media, g.campOrder, g.camps, isOpen, openState));
  });
}

// ── 1단계: 매체 ──
function buildMediaSection(media, campOrder, campGroups, isOpen, openState) {
  const section = document.createElement('div');
  section.className = 'media-section' + (isOpen ? ' open' : '');
  section.dataset.media = media;

  const totalRows = [...new Set(campOrder)].reduce((s, c) => {
    const cg = campGroups[c];
    return s + [...new Set(cg.grpOrder)].reduce((ss, g) => ss + cg.grps[g].length, 0);
  }, 0);

  // 헤더
  const header = document.createElement('div');
  header.className = 'media-section-header';
  header.onclick = e => { if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return; section.classList.toggle('open'); };

  const toggle = document.createElement('span'); toggle.className = 'media-toggle'; toggle.textContent = '▶';

  const nameInput = document.createElement('input');
  nameInput.type = 'text'; nameInput.className = 'media-name-input';
  nameInput.value = media === '(미분류)' ? '' : media; nameInput.placeholder = '매체명';
  nameInput.onclick = e => e.stopPropagation();
  nameInput.onchange = () => {
    const oldName = section.dataset.media;
    const newName = nameInput.value.trim() || '(미분류)';
    section.dataset.media = newName;
    section.querySelector('.campaign-container').dataset.media = newName;
    section.querySelectorAll('.campaign-section').forEach(cs => {
      cs.dataset.campKey = newName + '::' + cs.dataset.camp;
      cs.querySelectorAll('.group-section').forEach(gs => {
        gs.dataset.groupKey = newName + '::' + cs.dataset.camp + '::' + gs.dataset.grp;
      });
    });
    hierarchyState.forEach(r => { if ((r.매체 || '(미분류)') === oldName) r.매체 = newName === '(미분류)' ? '' : newName; });
  };

  const badge = document.createElement('span'); badge.className = 'media-row-count'; badge.textContent = totalRows + '개';

  const delBtn = document.createElement('button');
  delBtn.className = 'btn btn-danger btn-sm'; delBtn.style.cssText = 'padding:3px 8px;font-size:11px;'; delBtn.textContent = '매체 삭제';
  delBtn.onclick = e => {
    e.stopPropagation();
    const m = section.dataset.media;
    if (!confirm(`'${m}' 매체와 하위 모든 행을 삭제하시겠습니까?`)) return;
    hierarchyState = hierarchyState.filter(r => (r.매체 || '(미분류)') !== m);
    section.remove();
  };

  header.append(toggle, nameInput, badge, delBtn);

  // 바디
  const body = document.createElement('div'); body.className = 'media-section-body';
  const inner = document.createElement('div'); inner.className = 'media-section-body-inner';

  const campContainer = document.createElement('div');
  campContainer.className = 'campaign-container'; campContainer.dataset.media = media;

  const firstLoad = !openState || openState.media.size === 0;
  const uniqueCamps = [...new Set(campOrder)];
  uniqueCamps.forEach(camp => {
    const cg = campGroups[camp];
    const isCampOpen = openState && openState.camps.has(media + '::' + camp);
    campContainer.appendChild(buildCampaignSection(media, camp, cg.grpOrder, cg.grps, isCampOpen, openState, firstLoad));
  });
  if (!uniqueCamps.length) campContainer.appendChild(makeEmptyMsg('캠페인이 없습니다. [+ 캠페인 추가]를 눌러 추가하세요.', 'camp-empty'));

  inner.appendChild(campContainer);

  // 캠페인 추가 바
  const addCampBar = document.createElement('div'); addCampBar.className = 'add-camp-bar';
  const ci = document.createElement('input'); ci.className = 'h-input'; ci.type = 'text'; ci.placeholder = '새 캠페인명'; ci.style.maxWidth = '190px';
  const cb = document.createElement('button'); cb.className = 'btn btn-ghost btn-sm'; cb.textContent = '+ 캠페인 추가';
  cb.onclick = () => { const n = ci.value.trim(); if (!n) { ci.focus(); return; } addCampaignSection(section, n); ci.value = ''; };
  ci.onkeydown = e => { if (e.key === 'Enter') cb.click(); };
  addCampBar.append(ci, cb);
  inner.appendChild(addCampBar);

  body.appendChild(inner);
  section.append(header, body);
  return section;
}

// ── 2단계: 캠페인 ──
function buildCampaignSection(media, camp, grpOrder, grpGroups, isOpen, openState, firstLoad) {
  const section = document.createElement('div');
  section.className = 'campaign-section' + (isOpen ? ' open' : '');
  section.dataset.camp = camp;
  section.dataset.campKey = media + '::' + camp;

  const totalRows = [...new Set(grpOrder)].reduce((s, g) => s + grpGroups[g].length, 0);

  // 헤더
  const header = document.createElement('div'); header.className = 'campaign-section-header';
  header.onclick = e => { if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return; section.classList.toggle('open'); };

  const toggle = document.createElement('span'); toggle.className = 'campaign-toggle'; toggle.textContent = '▶';

  const nameInput = document.createElement('input');
  nameInput.type = 'text'; nameInput.className = 'campaign-name-input';
  nameInput.value = camp === '(미분류)' ? '' : camp; nameInput.placeholder = '캠페인명';
  nameInput.onclick = e => e.stopPropagation();
  nameInput.onchange = () => {
    const oldCamp = section.dataset.camp;
    const m = section.closest('.media-section').dataset.media;
    const newCamp = nameInput.value.trim() || '(미분류)';
    section.dataset.camp = newCamp;
    section.dataset.campKey = m + '::' + newCamp;
    section.querySelectorAll('.group-section').forEach(gs => {
      gs.dataset.groupKey = m + '::' + newCamp + '::' + gs.dataset.grp;
    });
    hierarchyState.forEach(r => {
      if ((r.매체 || '(미분류)') === m && (r.캠페인 || '(미분류)') === oldCamp) r.캠페인 = newCamp === '(미분류)' ? '' : newCamp;
    });
  };

  const badge = document.createElement('span'); badge.className = 'media-row-count'; badge.textContent = totalRows + '개';

  const delBtn = document.createElement('button');
  delBtn.className = 'btn btn-danger btn-sm'; delBtn.style.cssText = 'padding:3px 8px;font-size:11px;'; delBtn.textContent = '캠페인 삭제';
  delBtn.onclick = e => {
    e.stopPropagation();
    const c = section.dataset.camp;
    const m = section.closest('.media-section').dataset.media;
    if (!confirm(`'${c}' 캠페인과 하위 모든 행을 삭제하시겠습니까?`)) return;
    hierarchyState = hierarchyState.filter(r => !((r.매체 || '(미분류)') === m && (r.캠페인 || '(미분류)') === c));
    section.remove();
    _updateMediaBadge(section.closest ? null : null); // 매체 배지 갱신
    const ms = document.querySelector(`.media-section[data-media="${CSS.escape(m)}"]`);
    if (ms) updateMediaBadge(ms);
  };

  header.append(toggle, nameInput, badge, delBtn);

  // 바디
  const body = document.createElement('div'); body.className = 'campaign-section-body';
  const inner = document.createElement('div'); inner.className = 'campaign-section-body-inner';

  const grpContainer = document.createElement('div'); grpContainer.className = 'group-container';

  const uniqueGrps = [...new Set(grpOrder)];
  uniqueGrps.forEach(grp => {
    const rows = grpGroups[grp];
    const isGrpOpen = openState && openState.groups.has(media + '::' + camp + '::' + grp);
    grpContainer.appendChild(buildGroupSection(media, camp, grp, rows, isGrpOpen));
  });
  if (!uniqueGrps.length) grpContainer.appendChild(makeEmptyMsg('그룹이 없습니다. [+ 그룹 추가]를 눌러 추가하세요.', 'grp-empty'));

  inner.appendChild(grpContainer);

  // 그룹 추가 바
  const addGrpBar = document.createElement('div'); addGrpBar.className = 'add-group-bar';
  const gi = document.createElement('input'); gi.className = 'h-input'; gi.type = 'text'; gi.placeholder = '새 그룹명'; gi.style.maxWidth = '190px';
  const gb = document.createElement('button'); gb.className = 'btn btn-ghost btn-sm'; gb.textContent = '+ 그룹 추가';
  gb.onclick = () => { const n = gi.value.trim(); if (!n) { gi.focus(); return; } addGroupSection(section, n); gi.value = ''; };
  gi.onkeydown = e => { if (e.key === 'Enter') gb.click(); };
  addGrpBar.append(gi, gb);
  inner.appendChild(addGrpBar);

  body.appendChild(inner);
  section.append(header, body);
  return section;
}

// ── 3단계: 그룹 ──
function buildGroupSection(media, camp, grp, rows, isOpen) {
  const section = document.createElement('div');
  section.className = 'group-section' + (isOpen ? ' open' : '');
  section.dataset.grp = grp;
  section.dataset.groupKey = media + '::' + camp + '::' + grp;

  // 헤더
  const header = document.createElement('div'); header.className = 'group-section-header';
  header.onclick = e => { if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return; section.classList.toggle('open'); };

  const toggle = document.createElement('span'); toggle.className = 'group-toggle'; toggle.textContent = '▶';

  const nameInput = document.createElement('input');
  nameInput.type = 'text'; nameInput.className = 'group-name-input';
  nameInput.value = grp === '(미분류)' ? '' : grp; nameInput.placeholder = '그룹명';
  nameInput.onclick = e => e.stopPropagation();
  nameInput.onchange = () => {
    const oldGrp = section.dataset.grp;
    const cs = section.closest('.campaign-section');
    const ms = section.closest('.media-section');
    const m = ms ? ms.dataset.media : '';
    const c = cs ? cs.dataset.camp : '';
    const newGrp = nameInput.value.trim() || '(미분류)';
    section.dataset.grp = newGrp;
    section.dataset.groupKey = m + '::' + c + '::' + newGrp;
    hierarchyState.forEach(r => {
      if ((r.매체 || '(미분류)') === m && (r.캠페인 || '(미분류)') === c && (r.그룹 || '(미분류)') === oldGrp)
        r.그룹 = newGrp === '(미분류)' ? '' : newGrp;
    });
  };

  const badge = document.createElement('span'); badge.className = 'media-row-count'; badge.textContent = rows.length + '개';

  const addBtn = document.createElement('button');
  addBtn.className = 'btn btn-ghost btn-sm'; addBtn.textContent = '+ 소재 추가';
  addBtn.onclick = e => { e.stopPropagation(); addCreativeRow(section); };

  const delBtn = document.createElement('button');
  delBtn.className = 'btn btn-danger btn-sm'; delBtn.style.cssText = 'padding:3px 8px;font-size:11px;'; delBtn.textContent = '그룹 삭제';
  delBtn.onclick = e => {
    e.stopPropagation();
    const g = section.dataset.grp;
    const cs = section.closest('.campaign-section');
    const ms = section.closest('.media-section');
    const m = ms ? ms.dataset.media : '';
    const c = cs ? cs.dataset.camp : '';
    if (!confirm(`'${g}' 그룹과 하위 소재이름 전체를 삭제하시겠습니까?`)) return;
    hierarchyState = hierarchyState.filter(r => !((r.매체 || '(미분류)') === m && (r.캠페인 || '(미분류)') === c && (r.그룹 || '(미분류)') === g));
    section.remove();
    if (cs) updateCampBadge(cs);
    if (ms) updateMediaBadge(ms);
  };

  header.append(toggle, nameInput, badge, addBtn, delBtn);

  // 바디 (소재이름 목록)
  const body = document.createElement('div'); body.className = 'group-section-body';
  const inner = document.createElement('div'); inner.className = 'group-section-body-inner';
  const list = document.createElement('div'); list.className = 'creative-list';

  rows.forEach(row => list.appendChild(buildCreativeRow(row, list, section)));
  if (!rows.length) list.appendChild(makeCreativeEmpty());

  inner.appendChild(list);
  body.appendChild(inner);
  section.append(header, body);
  return section;
}

// ── 소재이름 행 ──
function buildCreativeRow(row, list, grpSection) {
  const div = document.createElement('div'); div.className = 'creative-row';

  const inp = document.createElement('input');
  inp.type = 'text'; inp.className = 'h-input';
  inp.value = row.소재이름 || ''; inp.placeholder = '소재이름';
  inp.oninput = () => { row.소재이름 = inp.value; };

  const delBtn = document.createElement('button');
  delBtn.className = 'btn btn-danger btn-sm'; delBtn.style.cssText = 'padding:3px 8px;font-size:11px;flex-shrink:0;'; delBtn.textContent = '삭제';
  delBtn.onclick = () => {
    const idx = hierarchyState.indexOf(row);
    if (idx !== -1) hierarchyState.splice(idx, 1);
    div.remove();
    if (!list.children.length) list.appendChild(makeCreativeEmpty());
    updateGroupBadge(grpSection);
    const cs = grpSection.closest('.campaign-section');
    const ms = grpSection.closest('.media-section');
    if (cs) updateCampBadge(cs);
    if (ms) updateMediaBadge(ms);
  };

  div.append(inp, delBtn);
  return div;
}

function addCreativeRow(grpSection) {
  const ms = grpSection.closest('.media-section');
  const cs = grpSection.closest('.campaign-section');
  const newRow = {
    매체:    ms ? (ms.dataset.media   === '(미분류)' ? '' : ms.dataset.media)   : '',
    캠페인:  cs ? (cs.dataset.camp    === '(미분류)' ? '' : cs.dataset.camp)    : '',
    그룹:        grpSection.dataset.grp === '(미분류)' ? '' : grpSection.dataset.grp,
    소재이름: ''
  };
  hierarchyState.push(newRow);

  const list = grpSection.querySelector('.creative-list');
  const empty = list.querySelector('.creative-empty');
  if (empty) empty.remove();
  const row = buildCreativeRow(newRow, list, grpSection);
  list.appendChild(row);

  updateGroupBadge(grpSection);
  if (cs) updateCampBadge(cs);
  if (ms) updateMediaBadge(ms);
  row.querySelector('.h-input')?.focus();
  row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ── 섹션 추가 ──
function addGroupSection(campSection, grpName) {
  const ms = campSection.closest('.media-section');
  const media = ms ? ms.dataset.media : '(미분류)';
  const camp  = campSection.dataset.camp;

  const existing = [...campSection.querySelectorAll('.group-section')].find(gs => gs.dataset.grp === grpName);
  if (existing) { existing.classList.add('open'); existing.scrollIntoView({ behavior: 'smooth', block: 'start' }); return; }

  const grpContainer = campSection.querySelector('.group-container');
  const emptyEl = grpContainer.querySelector('.camp-empty,.grp-empty');
  if (emptyEl) emptyEl.remove();

  const gs = buildGroupSection(media, camp, grpName, [], true);
  grpContainer.appendChild(gs);
  gs.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function addCampaignSection(mediaSection, campName) {
  const media = mediaSection.dataset.media;

  const existing = [...mediaSection.querySelectorAll('.campaign-section')].find(cs => cs.dataset.camp === campName);
  if (existing) { existing.classList.add('open'); existing.scrollIntoView({ behavior: 'smooth', block: 'start' }); return; }

  const campContainer = mediaSection.querySelector('.campaign-container');
  const emptyEl = campContainer.querySelector('.camp-empty');
  if (emptyEl) emptyEl.remove();

  const cs = buildCampaignSection(media, campName, [], {}, true, null, true);
  campContainer.appendChild(cs);
  cs.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function addMediaSection() {
  const input = document.getElementById('newMediaName');
  const name = input.value.trim();
  if (!name) { input.focus(); return; }

  const container = document.getElementById('hierarchyAccordion');
  const emptyEl = container.querySelector('p');
  if (emptyEl) emptyEl.remove();

  const existing = container.querySelector(`.media-section[data-media="${CSS.escape(name)}"]`);
  if (existing) { existing.classList.add('open'); existing.scrollIntoView({ behavior: 'smooth', block: 'start' }); input.value = ''; return; }

  const section = buildMediaSection(name, [], {}, true, null);
  container.appendChild(section);
  section.scrollIntoView({ behavior: 'smooth', block: 'start' });
  input.value = '';
}

// ── 배지 갱신 헬퍼 ──
function updateGroupBadge(grpSection) {
  const ms = grpSection.closest('.media-section');
  const cs = grpSection.closest('.campaign-section');
  const m = ms ? ms.dataset.media : '(미분류)';
  const c = cs ? cs.dataset.camp  : '(미분류)';
  const g = grpSection.dataset.grp;
  const cnt = hierarchyState.filter(r => (r.매체||'(미분류)') === m && (r.캠페인||'(미분류)') === c && (r.그룹||'(미분류)') === g).length;
  const badge = grpSection.querySelector(':scope > .group-section-header .media-row-count');
  if (badge) badge.textContent = cnt + '개';
}

function updateCampBadge(campSection) {
  const ms = campSection.closest('.media-section');
  const m = ms ? ms.dataset.media : '(미분류)';
  const c = campSection.dataset.camp;
  const cnt = hierarchyState.filter(r => (r.매체||'(미분류)') === m && (r.캠페인||'(미분류)') === c).length;
  const badge = campSection.querySelector(':scope > .campaign-section-header .media-row-count');
  if (badge) badge.textContent = cnt + '개';
}

function updateMediaBadge(mediaSection) {
  if (!mediaSection) return;
  const m = mediaSection.dataset.media;
  const cnt = hierarchyState.filter(r => (r.매체||'(미분류)') === m).length;
  const badge = mediaSection.querySelector(':scope > .media-section-header .media-row-count');
  if (badge) badge.textContent = cnt + '개';
}

// ── 빈 안내 요소 ──
function makeEmptyMsg(text, cls) {
  const p = document.createElement('p');
  p.className = cls; p.style.cssText = 'padding:8px 0;color:#9ca3af;font-size:12px;text-align:center;';
  p.textContent = text;
  return p;
}

function makeCreativeEmpty() {
  const p = document.createElement('p');
  p.className = 'creative-empty'; p.style.cssText = 'padding:6px 0;color:#9ca3af;font-size:12px;';
  p.textContent = '소재이름이 없습니다. [+ 소재 추가]를 눌러 추가하세요.';
  return p;
}

function saveHierarchyData() {

  document.getElementById('btnSaveHierarchy').disabled = true;

  document.getElementById('spinHierarchy').classList.add('show');

  document.getElementById('btnSaveHierarchyText').textContent = '저장 중...';



  google.script.run

    .withSuccessHandler(res => {

      document.getElementById('btnSaveHierarchy').disabled = false;

      document.getElementById('spinHierarchy').classList.remove('show');

      document.getElementById('btnSaveHierarchyText').textContent = '계층 저장';

      if (res.error) { showSettingsError(res.message); return; }

      showSettingsSuccess('계층 구조 저장 완료! 등록 탭 드롭다운이 업데이트됩니다.');

      loadHierarchy(); // 등록 탭 연쇄 드롭다운 갱신

    })

    .withFailureHandler(err => {

      document.getElementById('btnSaveHierarchy').disabled = false;

      document.getElementById('spinHierarchy').classList.remove('show');

      document.getElementById('btnSaveHierarchyText').textContent = '계층 저장';

      showSettingsError('저장 실패: ' + err.message);

    })

    .saveHierarchy(hierarchyState);

}

// --- 이미지 선택 모달 ----------------------------

function ensureModal() {

  if (document.getElementById('imgModalOverlay')) return;



  var overlay = document.createElement('div');

  overlay.id = 'imgModalOverlay';

  overlay.className = 'modal-overlay';

  overlay.addEventListener('click', onModalOverlayClick);



  var modal = document.createElement('div');

  modal.className = 'modal';

  modal.id = 'imgModal';



  // 헤더

  var header = document.createElement('div');

  header.className = 'modal-header';



  var title = document.createElement('span');

  title.className = 'modal-title';

  title.textContent = '이미지 선택';



  var controls = document.createElement('div');

  controls.style.cssText = 'display:flex;align-items:center;gap:10px;';



  var searchInput = document.createElement('input');

  searchInput.type = 'text';

  searchInput.className = 'modal-search';

  searchInput.id = 'imgSearch';

  searchInput.placeholder = '코드 또는 소재명 검색...';

  searchInput.addEventListener('input', filterImagePicker);



  var closeBtn = document.createElement('button');

  closeBtn.className = 'btn btn-ghost btn-sm';

  closeBtn.textContent = '닫기';

  closeBtn.addEventListener('click', closeImageModal);



  controls.appendChild(searchInput);

  controls.appendChild(closeBtn);

  header.appendChild(title);

  header.appendChild(controls);



  // 바디

  var body = document.createElement('div');

  body.className = 'modal-body';



  var grid = document.createElement('div');

  grid.className = 'img-picker-grid';

  grid.id = 'imgPickerGrid';



  var loading = document.createElement('div');

  loading.className = 'modal-empty';

  loading.textContent = '불러오는 중...';



  grid.appendChild(loading);

  body.appendChild(grid);

  modal.appendChild(header);

  modal.appendChild(body);

  overlay.appendChild(modal);

  document.body.appendChild(overlay);

}



function openImageModal() {

  ensureModal();

  document.getElementById('imgModalOverlay').classList.add('open');

  document.getElementById('imgSearch').value = '';

  if (!imageCodesLoaded) {

    loadExistingCodes();

  } else {

    filterImagePicker();

  }

}



function closeImageModal() {

  document.getElementById('imgModalOverlay').classList.remove('open');

}



function onModalOverlayClick(e) {

  if (e.target === document.getElementById('imgModalOverlay')) closeImageModal();

}



function loadExistingCodes() {

  const grid = document.getElementById('imgPickerGrid');

  grid.innerHTML = '<div class="modal-empty">불러오는 중...</div>';

  google.script.run

    .withSuccessHandler(codes => {

      allImageCodes = codes;

      imageCodesLoaded = true;

      renderImagePicker(codes);

    })

    .withFailureHandler(() => {

      grid.innerHTML = '<div class="modal-empty" style="color:#ef4444;">로드 실패 - 다시 시도해 주세요.</div>';

    })

    .getImageCodes();

}



function filterImagePicker() {

  const q = document.getElementById('imgSearch').value.trim().toLowerCase();

  const filtered = q

    ? allImageCodes.filter(c =>

        c.code.toLowerCase().includes(q) || c.소재이름.toLowerCase().includes(q))

    : allImageCodes;

  renderImagePicker(filtered);

}



function driveThumbnail(url) {

  if (!url) return '';

  const m = url.match(/[?&]id=([^&]+)/);

  return m ? 'https://drive.google.com/thumbnail?id=' + m[1] + '&sz=w200' : url;

}



function renderImagePicker(codes) {

  const grid = document.getElementById('imgPickerGrid');

  if (!codes.length) {

    grid.innerHTML = '<div class="modal-empty">검색 결과가 없습니다.</div>';

    return;

  }

  grid.innerHTML = '';

  codes.forEach(c => {

    const item = document.createElement('div');

    item.className = 'img-pick-item';

    if (c.code === selectedImageCodeValue) item.classList.add('selected');

    item.dataset.code = c.code;

    item.onclick = () => selectImageCode(c.code, c.소재이름, c.imageUrl, item);



    const isVideo = !c.imageUrl || c.imageUrl.includes('video');

    const thumbUrl = driveThumbnail(c.imageUrl);

    if (thumbUrl && !isVideo) {

      const img = document.createElement('img');

      img.className = 'img-pick-thumb';

      img.src = thumbUrl;

      img.loading = 'lazy';

      img.onerror = function() {

        const ph = document.createElement('div');

        ph.className = 'img-pick-placeholder';

        ph.textContent = '[IMG]';

        this.replaceWith(ph);

      };

      item.appendChild(img);

    } else {

      const ph = document.createElement('div');

      ph.className = 'img-pick-placeholder';

      ph.textContent = isVideo ? '[VID]' : '[IMG]';

      item.appendChild(ph);

    }

    const info = document.createElement('div');

    info.className = 'img-pick-info';

    info.innerHTML = '<div class="img-pick-code">' + escHtml(c.code) + '</div>'

      + '<div class="img-pick-name">' + escHtml(c.소재이름) + '</div>'

      + '<div class="img-pick-date">' + escHtml(c.등록일자) + '</div>';

    item.appendChild(info);

    grid.appendChild(item);

  });

}



function selectImageCode(code, name, imageUrl, el) {

  selectedImageCodeValue = code;

  closeImageModal();



  // 선택 바 업데이트

  const thumbUrl = driveThumbnail(imageUrl);

  const thumb = document.getElementById('imgSelectedThumb');

  thumb.src = thumbUrl || '';

  thumb.style.display = thumbUrl ? 'block' : 'none';

  document.getElementById('imgSelectedText').textContent = `${code}  |  ${name}`;

  document.getElementById('imgSelectedBar').classList.add('show');



  // 폼 자동 채우기

  google.script.run

    .withSuccessHandler(autoFillForm)

    .withFailureHandler(() => {})

    .getCreativeByImageCode(code);

}



function clearImageSelection() {

  selectedImageCodeValue = '';

  existingImageUrl = '';

  document.getElementById('imgSelectedBar').classList.remove('show');

  document.getElementById('imgSelectedThumb').src = '';

}



function autoFillForm(data) {

  if (!data) return;

  document.getElementById('f_매체').value = data.매체;

  onMediaChange();

  document.getElementById('f_캠페인').value = data.캠페인;

  onCampaignChange();

  document.getElementById('f_그룹').value = data.그룹;

  onGroupChange();

  document.getElementById('f_소재이름').value = data.소재이름;

  document.getElementById('f_보종').value = data.보종;

  document.getElementById('f_광고유형').value = data.광고유형;

  document.getElementById('f_소재유형').value = data.소재유형;

  document.getElementById('f_소구포인트').value = data.소구포인트;

  document.getElementById('f_후킹방식').value = data.후킹방식;

  document.getElementById('f_소구상세').value = data.소구상세;

  document.getElementById('f_이미지유형').value = data.이미지유형;

  document.getElementById('f_모델유형').value = data.모델유형;



  // 기존 이미지 URL 표시 및 미리보기

  existingImageUrl = data.이미지URL || '';

  const urlEl = document.getElementById('displayUrl');

  urlEl.textContent = existingImageUrl || '(URL 없음)';

  urlEl.classList.toggle('empty', !existingImageUrl);

  if (existingImageUrl) {

    const img = document.getElementById('previewImg');

    const vid = document.getElementById('previewVideo');

    img.src = driveThumbnail(existingImageUrl);

    img.style.display = 'block';

    vid.style.display = 'none';

    document.getElementById('previewName').textContent = '기존 이미지';

    document.getElementById('previewArea').classList.add('show');

  }

}



// --- 파일 업로드 ---------------------------------

function onDragOver(e) { e.preventDefault(); document.getElementById('uploadZone').classList.add('dragover'); }

function onDragLeave()  { document.getElementById('uploadZone').classList.remove('dragover'); }

function onDrop(e) { e.preventDefault(); onDragLeave(); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); }

function onFileSelected(e) { if (e.target.files[0]) handleFile(e.target.files[0]); }



async function handleFile(file) {

  const allowed = ['image/jpeg','image/png','image/gif','image/webp','video/mp4','video/quicktime'];

  if (!allowed.includes(file.type)) { showError('지원하지 않는 파일 형식입니다.'); return; }

  fileName = file.name; fileMime = file.type; fileHash = null;



  // SHA-256 해시 계산 (동일 이미지 판별용)

  try {

    const buffer = await file.arrayBuffer();

    const hashBuf = await crypto.subtle.digest('SHA-256', buffer);

    fileHash = Array.from(new Uint8Array(hashBuf))

      .map(b => b.toString(16).padStart(2, '0')).join('');

  } catch (e) {

    fileHash = null; // 해시 실패 시 무시 - 신규로 처리

  }



  const reader = new FileReader();

  reader.onload = ev => {

    fileBase64 = ev.target.result.split(',')[1];

    const img = document.getElementById('previewImg');

    const vid = document.getElementById('previewVideo');

    document.getElementById('previewArea').classList.add('show');

    if (file.type.startsWith('image/')) {

      img.src = ev.target.result; img.style.display = 'block'; vid.style.display = 'none';

    } else {

      vid.src = ev.target.result; vid.style.display = 'block'; img.style.display = 'none';

    }

    document.getElementById('previewName').textContent = file.name;

  };

  reader.readAsDataURL(file);

}



// --- 폼 저장 -------------------------------------

const REQUIRED_IDS = ['f_매체','f_캠페인','f_그룹','f_소재이름','f_보종','f_광고유형','f_소재유형'];



function validateForm() {

  let ok = true;

  REQUIRED_IDS.forEach(id => {

    const el = document.getElementById(id);

    if (!el.value) { el.classList.add('error'); ok = false; }

    else el.classList.remove('error');

  });

  return ok;

}



function getFormData(forceSave) {

  return {

    매체:       document.getElementById('f_매체').value,

    캠페인:     document.getElementById('f_캠페인').value,

    그룹:       document.getElementById('f_그룹').value,

    소재이름:   document.getElementById('f_소재이름').value,

    보종:       document.getElementById('f_보종').value,

    광고유형:   document.getElementById('f_광고유형').value,

    소재유형:   document.getElementById('f_소재유형').value,

    소구포인트: document.getElementById('f_소구포인트').value,

    후킹방식:   document.getElementById('f_후킹방식').value,

    소구상세:   document.getElementById('f_소구상세').value.trim(),

    이미지유형: document.getElementById('f_이미지유형').value,

    모델유형:   document.getElementById('f_모델유형').value,

    fileData: fileBase64, fileName, mimeType: fileMime, fileHash,

    existingImageUrl,

    selectedImageCode: document.getElementById('useExistingCode').checked

      ? selectedImageCodeValue : '',

    forceSave: !!forceSave

  };

}



function submitForm(forceSave) {

  hideMessages();

  if (!validateForm()) { showError('필수 항목(*)을 모두 선택해 주세요.'); return; }

  setSaving(true);

  google.script.run

    .withSuccessHandler(res => {

      setSaving(false);

      if (res.duplicate) {

        if (confirm('이미 등록된 소재입니다. 그래도 등록하시겠습니까?')) submitForm(true);

        return;

      }

      if (res.error) { showError(res.message); return; }

      document.getElementById('displayCode').textContent = res.imageCode;

      document.getElementById('displayCode').classList.remove('empty');

      document.getElementById('displayUrl').textContent = res.imageUrl || '(파일 없음)';

      document.getElementById('displayUrl').classList.remove('empty');

      const reuseMsg = res.reused ? ' (동일 이미지 - 기존 코드 재사용)' : '';

      const unitMsg = res.광고단위코드 ? ' | 광고단위: ' + res.광고단위코드 : '';

      showSuccess('등록 완료! 이미지코드: ' + res.imageCode + unitMsg + reuseMsg);

      if (isIndexing) { markDetectItemDone(detectIndex - 1); loadNextDetectItem(); }

      else setTimeout(resetForm, 2000);

    })

    .withFailureHandler(err => { setSaving(false); showError('저장 실패: ' + err.message); })

    .saveCreative(getFormData(forceSave));

}



function resetForm() {

  // 계층 드롭다운 리셋

  document.getElementById('f_매체').value = '';

  resetCascade(['f_캠페인','f_그룹','f_소재이름']);

  // 기타 드롭다운 리셋

  Object.values(DROPDOWN_MAP).forEach(id => {

    const el = document.getElementById(id);

    if (el) { el.selectedIndex = 0; el.classList.remove('error'); }

  });

  document.getElementById('f_소구상세').value = '';

  REQUIRED_IDS.forEach(id => document.getElementById(id)?.classList.remove('error'));



  fileBase64 = fileName = fileMime = fileHash = null;

  existingImageUrl = '';

  document.getElementById('fileInput').value = '';

  document.getElementById('useExistingCode').checked = false;

  toggleCodeMode(false);

  document.getElementById('previewArea').classList.remove('show');

  document.getElementById('previewImg').src = '';

  document.getElementById('previewVideo').src = '';

  document.getElementById('displayCode').textContent = '저장 시 자동 생성';

  document.getElementById('displayCode').classList.add('empty');

  document.getElementById('displayUrl').textContent = '업로드 후 자동 생성';

  document.getElementById('displayUrl').classList.add('empty');

  hideMessages();

}



// --- 신규 소재 감지 ------------------------------

function runDetect() {

  const btn = document.getElementById('btnDetect');

  btn.disabled = true;

  document.getElementById('spinDetect').classList.add('show');

  google.script.run

    .withSuccessHandler(res => {

      btn.disabled = false; document.getElementById('spinDetect').classList.remove('show');

      if (res.error) { showError(res.message); return; }

      renderDetectPanel(res);

    })

    .withFailureHandler(err => {

      btn.disabled = false; document.getElementById('spinDetect').classList.remove('show');

      showError('감지 실패: ' + err.message);

    })

    .detectNewCreatives();

}



function renderDetectPanel(res) {

  detectItems = res.items || []; detectIndex = 0; isIndexing = false;

  document.getElementById('detectCount').textContent = res.count;

  document.getElementById('detectMsgText').textContent = res.message;

  document.getElementById('detectPanel').classList.add('show');

  const list = document.getElementById('detectList');

  list.innerHTML = '';

  detectItems.forEach((item, i) => {

    const div = document.createElement('div');

    div.className = 'detect-item'; div.id = 'detect-item-' + i;

    div.innerHTML = `

      <div class="detect-item-info">

        <div class="media">${escHtml(item.매체)}</div>

        <div class="name">${escHtml(item.캠페인)} / ${escHtml(item.그룹)} / ${escHtml(item.소재이름)}</div>

      </div>

      <span class="detect-badge" id="badge-${i}">대기</span>`;

    list.appendChild(div);

  });

  document.getElementById('btnStartIndex').style.display = detectItems.length ? 'flex' : 'none';

}



function startIndexing() {

  if (!detectItems.length) return;

  isIndexing = true; detectIndex = 0;

  document.getElementById('btnStartIndex').style.display = 'none';

  loadNextDetectItem();

}



function loadNextDetectItem() {

  if (detectIndex >= detectItems.length) {

    isIndexing = false;

    showSuccess(`인덱싱 완료! 총 ${detectItems.length}건 등록되었습니다.`);

    return;

  }

  const item = detectItems[detectIndex++];

  resetForm();



  // 매체 선택 후 연쇄 드롭다운 자동 설정

  const mediaSel = document.getElementById('f_매체');

  mediaSel.value = item.매체;

  onMediaChange();



  // 약간의 딜레이 후 캠페인/그룹/소재이름 설정 (DOM 업데이트 후)

  setTimeout(() => {

    document.getElementById('f_캠페인').value = item.캠페인;

    onCampaignChange();

    setTimeout(() => {

      document.getElementById('f_그룹').value = item.그룹;

      onGroupChange();

      setTimeout(() => {

        document.getElementById('f_소재이름').value = item.소재이름;

      }, 50);

    }, 50);

  }, 50);



  const badge = document.getElementById('badge-' + (detectIndex - 1));

  if (badge) { badge.textContent = '진행 중'; badge.style.cssText = 'background:#fef3c7;color:#92400e;'; }

  window.scrollTo({ top: 0, behavior: 'smooth' });

  showSuccess(`(${detectIndex}/${detectItems.length}) 나머지 정보를 선택 후 저장하세요.`);

}



function markDetectItemDone(i) {

  document.getElementById('detect-item-' + i)?.classList.add('done');

  const badge = document.getElementById('badge-' + i);

  if (badge) { badge.textContent = '완료'; badge.className = 'detect-badge done'; }

}



// --- 유틸 ----------------------------------------

function escHtml(s) {

  return String(s)

    .replace(/&/g,'&amp;').replace(/</g,'&lt;')

    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');

}



function setSaving(saving) {

  document.getElementById('btnSave').disabled = saving;

  document.getElementById('spinSave').classList.toggle('show', saving);

  document.getElementById('btnSaveText').textContent = saving ? '저장 중...' : '저장';

}



function showSuccess(msg) {

  document.getElementById('msgSuccessText').textContent = msg;

  document.getElementById('msgSuccess').classList.add('show');

  document.getElementById('msgError').classList.remove('show');

}

function showError(msg) {

  document.getElementById('msgErrorText').textContent = msg;

  document.getElementById('msgError').classList.add('show');

  document.getElementById('msgSuccess').classList.remove('show');

}

function hideMessages() {

  document.getElementById('msgSuccess').classList.remove('show');

  document.getElementById('msgError').classList.remove('show');

}

function showSettingsSuccess(msg) {

  document.getElementById('settingsMsgSuccessText').textContent = msg;

  document.getElementById('settingsMsgSuccess').classList.add('show');

  document.getElementById('settingsMsgError').classList.remove('show');

}

function showSettingsError(msg) {

  document.getElementById('settingsMsgErrorText').textContent = msg;

  document.getElementById('settingsMsgError').classList.add('show');

  document.getElementById('settingsMsgSuccess').classList.remove('show');

}

function hideSettingsMessages() {

  document.getElementById('settingsMsgSuccess').classList.remove('show');

  document.getElementById('settingsMsgError').classList.remove('show');

}


</script>
