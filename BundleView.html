<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>광고단위 소재</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    background: #f0f2f5; color: #1a1a2e; min-height: 100vh;
  }

  .header {
    background: #1a1a2e; color: #fff;
    padding: 16px 28px;
    position: sticky; top: 0; z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .unit-code {
    font-size: 11px; font-weight: 700; color: #818cf8;
    letter-spacing: .5px; margin-bottom: 4px;
  }
  .unit-name { font-size: 17px; font-weight: 700; }
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 11px; font-weight: 600; background: #312e81; color: #a5b4fc;
    white-space: nowrap;
  }

  .meta-bar {
    display: flex; flex-wrap: wrap; gap: 6px 16px;
    padding: 10px 28px; background: #16213e;
    font-size: 12px; color: #94a3b8;
  }
  .meta-item span { color: #cbd5e1; font-weight: 500; }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

  .not-found {
    text-align: center; padding: 80px 24px; color: #6b7280;
  }
  .not-found h2 { font-size: 20px; margin-bottom: 8px; color: #374151; }

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }

  .media-card {
    background: #fff; border-radius: 10px;
    border: 1px solid #e5e7eb; overflow: hidden;
    transition: box-shadow .15s;
  }
  .media-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); }

  .media-wrap {
    position: relative; width: 100%; aspect-ratio: 1;
    background: #f3f4f6; overflow: hidden;
  }
  .media-wrap img {
    width: 100%; height: 100%; object-fit: contain;
    display: block; transition: opacity .2s;
  }
  .media-wrap img.error { display: none; }
  .media-wrap .video-frame {
    width: 100%; height: 100%; border: none; display: block;
  }
  .media-wrap .no-media {
    width: 100%; height: 100%; display: flex; align-items: center;
    justify-content: center; font-size: 36px; color: #d1d5db;
  }

  .media-info { padding: 10px 12px; }
  .media-code {
    font-size: 11px; font-weight: 700; color: #4f6ef7;
    margin-bottom: 3px; word-break: break-all;
  }
  .media-label {
    font-size: 12px; color: #6b7280;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .media-actions { padding: 0 12px 10px; }
  .btn-open {
    display: block; width: 100%; padding: 6px;
    text-align: center; font-size: 12px; font-weight: 500;
    background: #f3f4f6; color: #374151; border: 1px solid #e5e7eb;
    border-radius: 6px; text-decoration: none; transition: background .15s;
  }
  .btn-open:hover { background: #e5e7eb; }

  @media (max-width: 600px) {
    .gallery { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
    .container { padding: 14px; }
    .header { padding: 12px 16px; }
    .meta-bar { padding: 8px 16px; }
  }
</style>
</head>
<body>

<? var d = data; ?>

<? if (!d) { ?>
<div class="not-found">
  <h2>광고단위를 찾을 수 없습니다</h2>
  <p><?= unitCode ?></p>
</div>
<? } else { ?>

<div class="header">
  <div class="header-top">
    <div>
      <div class="unit-code"><?= d.광고단위코드 ?></div>
      <div class="unit-name"><?= d.소재이름 ?></div>
    </div>
    <span class="badge"><?= d.매체 ?> · <?= d.이미지수 ?>개 소재</span>
  </div>
</div>

<div class="meta-bar">
  <div>캠페인 <span><?= d.캠페인 ?></span></div>
  <div>그룹 <span><?= d.그룹 ?></span></div>
  <? if (d.보종) { ?><div>보종 <span><?= d.보종 ?></span></div><? } ?>
  <? if (d.광고유형) { ?><div>광고유형 <span><?= d.광고유형 ?></span></div><? } ?>
  <? if (d.소재유형) { ?><div>소재유형 <span><?= d.소재유형 ?></span></div><? } ?>
</div>

<div class="container">
  <? if (!d.images || d.images.length === 0) { ?>
  <div class="not-found">
    <h2>등록된 소재 이미지가 없습니다</h2>
  </div>
  <? } else { ?>
  <div class="gallery">
    <? for (var i = 0; i < d.images.length; i++) { ?>
    <? var img = d.images[i]; ?>
    <? var isVideo = img.url && img.url.indexOf('/preview') !== -1; ?>
    <div class="media-card">
      <div class="media-wrap">
        <? if (!img.url) { ?>
        <div class="no-media">📷</div>
        <? } else if (isVideo) { ?>
        <iframe class="video-frame" src="<?= img.url ?>" allowfullscreen></iframe>
        <? } else { ?>
        <img src="<?= img.url ?>" alt="<?= img.code ?>"
             onerror="this.classList.add('error');this.nextElementSibling.style.display='flex'">
        <div class="no-media" style="display:none;position:absolute;inset:0;">🖼️</div>
        <? } ?>
      </div>
      <div class="media-info">
        <div class="media-code"><?= img.code ?></div>
        <div class="media-label"><?= img.소재이름 ?></div>
      </div>
      <? if (img.url) { ?>
      <div class="media-actions">
        <a class="btn-open" href="<?= img.url ?>" target="_blank">원본 열기</a>
      </div>
      <? } ?>
    </div>
    <? } ?>
  </div>
  <? } ?>
</div>

<? } ?>
</body>
</html>
